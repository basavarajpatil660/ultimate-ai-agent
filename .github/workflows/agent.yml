name: Ultimate AI Agent

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 2 * * *'
    - cron: '30 4 * * *'
    - cron: '30 5 * * *'
    - cron: '30 7 * * *'
    - cron: '30 9 * * *'
    - cron: '30 11 * * *'
    - cron: '30 13 * * *'
    - cron: '30 15 * * *'
    - cron: '30 17 * * *'
    - cron: '30 19 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: 'What do you want the agent to do?'
        required: false
        default: ''
      mode:
        description: 'Agent mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - content
          - image
          - research
          - briefing
          - code
          - voice
          - image_read
          - image_edit

permissions:
  contents: write
  actions: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Agent
        env:
          INPUT_PROMPT: ${{ github.event.inputs.prompt }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          MODELSLAB_API_KEY: ${{ secrets.MODELSLAB_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PIXAZO_API_KEY: ${{ secrets.PIXAZO_API_KEY }}
        run: python main.py

      - name: Commit memory update
        run: |
          git config user.email "agent@github-actions"
          git config user.name "Ultimate AI Agent"
          git add memory.json
          git diff --staged --quiet || git commit -m "Update memory [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
